name: Build release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag
        required: true
        default: v0.2.0
        type: string

permissions:
  contents: read

env:
  APP_NAME: TheBricktertainmentSystem
  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
  SDL_VERSION: 3.4.12

jobs:
  windows:
    name: Windows x86-64
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Build static SDL3
        id: sdl
        uses: libsdl-org/setup-sdl@f0131347757b3b78ed886b7f0c36b19e26aa2937
        with:
          version: ${{ env.SDL_VERSION }}
          pre-release: false
          build-type: Release
          cmake-arguments: -DSDL_SHARED=OFF -DSDL_STATIC=ON -DSDL_TEST_LIBRARY=OFF -DSDL_FORCE_STATIC_VCRT=ON -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Configure
        run: >-
          cmake -S . -B build -A x64
          -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}"
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package portable executable
        shell: pwsh
        run: |
          $packageName = "$env:APP_NAME-$env:RELEASE_VERSION-Windows-x86_64"
          $packageDir = "dist/$packageName"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item "build/Release/$env:APP_NAME.exe" $packageDir
          Copy-Item "README.md" $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath "dist/$packageName.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: dist/*.zip
          if-no-files-found: error

  macos:
    name: macOS universal
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Build static SDL3
        id: sdl
        uses: libsdl-org/setup-sdl@f0131347757b3b78ed886b7f0c36b19e26aa2937
        with:
          version: ${{ env.SDL_VERSION }}
          pre-release: false
          build-type: Release
          cmake-arguments: '-DSDL_SHARED=OFF -DSDL_STATIC=ON -DSDL_TEST_LIBRARY=OFF "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"'

      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}"
          "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Verify universal executable
        run: lipo "build/$APP_NAME" -verify_arch x86_64 arm64

      - name: Package macOS executable
        run: |
          package_name="$APP_NAME-$RELEASE_VERSION-macOS-universal"
          package_dir="dist/$package_name"
          mkdir -p "$package_dir"
          cp "build/$APP_NAME" "$package_dir/"
          cp README.md "$package_dir/"
          tar -czf "dist/$package_name.tar.gz" -C dist "$package_name"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: dist/*.tar.gz
          if-no-files-found: error

  linux:
    name: Linux AppImage x86-64
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Build static SDL3
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            ca-certificates \
            cmake \
            curl \
            libasound2-dev \
            libaudio-dev \
            libdbus-1-dev \
            libdecor-0-dev \
            libdrm-dev \
            libegl1-mesa-dev \
            libfribidi-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libibus-1.0-dev \
            libjack-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libsndio-dev \
            libthai-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            libwayland-dev \
            libx11-dev \
            libxext-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            ninja-build \
            pkg-config

          archive="$RUNNER_TEMP/SDL3-$SDL_VERSION.tar.gz"
          source_dir="$RUNNER_TEMP/SDL3-$SDL_VERSION"
          build_dir="$RUNNER_TEMP/sdl3-build"
          install_dir="$RUNNER_TEMP/sdl3-install"

          curl --fail --location --retry 3 \
            --output "$archive" \
            "https://github.com/libsdl-org/SDL/releases/download/release-$SDL_VERSION/SDL3-$SDL_VERSION.tar.gz"
          tar -xzf "$archive" -C "$RUNNER_TEMP"

          cmake -S "$source_dir" -B "$build_dir" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$install_dir" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DSDL_SHARED=OFF \
            -DSDL_STATIC=ON \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF
          cmake --build "$build_dir" --parallel
          cmake --install "$build_dir"

      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/sdl3-install"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Download linuxdeploy
        run: |
          curl --fail --location --retry 3 \
            --output linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Package AppImage
        run: |
          generic_icon="$(find /usr/share/icons -type f \( -name 'application-x-executable*.svg' -o -name 'application-x-executable*.png' \) -print -quit)"
          if [[ -z "$generic_icon" ]]; then
            echo "Could not locate the runner's generic executable icon." >&2
            exit 1
          fi

          icon_extension="${generic_icon##*.}"
          package_icon="$RUNNER_TEMP/thebricktertainmentsystem.$icon_extension"
          cp "$generic_icon" "$package_icon"
          mkdir -p dist

          VERSION="$RELEASE_VERSION" ./linuxdeploy-x86_64.AppImage \
            --appimage-extract-and-run \
            --appdir AppDir \
            --executable "build/$APP_NAME" \
            --desktop-file packaging/linux/thebricktertainmentsystem.desktop \
            --icon-file "$package_icon" \
            --output appimage

          mv The_Bricktertainment_System*.AppImage \
            "dist/$APP_NAME-$RELEASE_VERSION-x86_64.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage-x86_64
          path: dist/*.AppImage
          if-no-files-found: error

  release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs:
      - windows
      - macos
      - linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/* --clobber
          else
            release_target=(--target "$GITHUB_SHA")
            if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
              release_target=(--verify-tag)
            fi

            gh release create "$RELEASE_VERSION" dist/* \
              "${release_target[@]}" \
              --draft \
              --generate-notes \
              --title "The Bricktertainment System $RELEASE_VERSION"
          fi
